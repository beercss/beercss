name: Issue Triage
on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run triage script
        env:
          JULES_GITHUB_TOKEN: ${{ secrets.JULES_GITHUB_TOKEN }}
        run: python3 triage_unlabeled_issues.py
